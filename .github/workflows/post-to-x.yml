name: Post Animal Video to X

on:
  push:
    branches: [main]
    paths: ['**.mp4', '**.mov']
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  post-to-x:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install tweepy requests requests-oauthlib

      - name: Diagnose X API access
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        run: |
          python3 << 'PYEOF'
          import os, sys, requests
          from requests_oauthlib import OAuth1

          consumer_key = os.environ['X_API_KEY']
          consumer_secret = os.environ['X_API_SECRET']
          access_token = os.environ['X_ACCESS_TOKEN']
          access_token_secret = os.environ['X_ACCESS_TOKEN_SECRET']
          auth = OAuth1(consumer_key, consumer_secret, access_token, access_token_secret)

          print("=== TEST 1: GET /2/users/me (read, v2) ===")
          r = requests.get('https://api.twitter.com/2/users/me', auth=auth)
          print(f"Status: {r.status_code}")
          print(f"Body: {r.text}")

          print("\n=== TEST 2: GET /1.1/account/verify_credentials.json (read, v1.1) ===")
          r2 = requests.get('https://api.twitter.com/1.1/account/verify_credentials.json', auth=auth)
          print(f"Status: {r2.status_code}")
          print(f"Body: {r2.text[:500]}")

          print("\n=== TEST 3: POST /2/tweets text-only ===")
          r3 = requests.post(
              'https://api.twitter.com/2/tweets',
              auth=auth,
              json={'text': 'Test #Animals'},
              headers={'Content-Type': 'application/json'}
          )
          print(f"Status: {r3.status_code}")
          print(f"Body: {r3.text}")

          if r3.status_code == 201:
              tweet_id = r3.json()['data']['id']
              requests.delete(f'https://api.twitter.com/2/tweets/{tweet_id}', auth=auth)
              print("Tweet posted and deleted!")
          PYEOF

      - name: Post latest video to X
        if: false
        run: echo "disabled until diagnosis complete"
