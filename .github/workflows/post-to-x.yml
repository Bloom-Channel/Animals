name: Post Animal Video to X
on:
  push:
    branches: [main]
    paths: ['**.mp4', '**.mov']
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:
jobs:
  post-to-x:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install tweepy requests requests-oauthlib
      - name: Diagnose X API access
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        run: |
          python3 - <<'PYEOF'
          import os, sys, requests
          from requests_oauthlib import OAuth1
          consumer_key = os.environ['X_API_KEY']
          consumer_secret = os.environ['X_API_SECRET']
          access_token = os.environ['X_ACCESS_TOKEN']
          access_token_secret = os.environ['X_ACCESS_TOKEN_SECRET']
          auth = OAuth1(consumer_key, consumer_secret, access_token, access_token_secret)
          summary_file = os.environ.get('GITHUB_STEP_SUMMARY', '/dev/stdout')
          def log(msg):
              print(msg, flush=True)
              with open(summary_file, 'a') as f:
                  f.write(msg + '\n')
          log('## X API Diagnosis')
          log('')
          log('### TEST 1: GET /2/users/me (v2 read)')
          r = requests.get('https://api.twitter.com/2/users/me', auth=auth)
          log(f'Status: {r.status_code}')
          log(f'Body: {r.text[:300]}')
          log('')
          log('### TEST 2: GET /1.1/account/verify_credentials.json')
          r2 = requests.get('https://api.twitter.com/1.1/account/verify_credentials.json', auth=auth)
          log(f'Status: {r2.status_code}')
          log(f'Body: {r2.text[:300]}')
          log('')
          log('### TEST 3: POST /2/tweets (text-only)')
          r3 = requests.post(
              'https://api.twitter.com/2/tweets',
              auth=auth,
              json={'text': 'Diagnostic test'},
              headers={'Content-Type': 'application/json'}
          )
          log(f'Status: {r3.status_code}')
          log(f'Body: {r3.text[:500]}')
          if r3.status_code == 201:
              tid = r3.json()['data']['id']
              requests.delete(f'https://api.twitter.com/2/tweets/{tid}', auth=auth)
              log('SUCCESS - tweet posted and deleted')
          log('')
          log('### TEST 4: tweepy.Client.create_tweet')
          import tweepy
          client = tweepy.Client(
              consumer_key=consumer_key, consumer_secret=consumer_secret,
              access_token=access_token, access_token_secret=access_token_secret
          )
          try:
              resp = client.create_tweet(text='Tweepy diagnostic test')
              log(f'tweepy status: {resp}')
              if resp.data:
                  client.delete_tweet(resp.data['id'])
                  log('SUCCESS - tweepy tweet posted and deleted')
          except Exception as e:
              log(f'tweepy error: {type(e).__name__}: {e}')
          PYEOF
      - name: Post latest video to X
        if: false
        run: echo "disabled"
