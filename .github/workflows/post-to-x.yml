name: Post Animal Video to X
on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:
jobs:
  post-to-x:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install tweepy requests requests-oauthlib
      - name: Post latest video to X
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        run: |
          python3 - <<'PYEOF'
          import os, sys, glob, time, requests, tweepy
          from requests_oauthlib import OAuth1

          consumer_key = os.environ['X_API_KEY']
          consumer_secret = os.environ['X_API_SECRET']
          access_token = os.environ['X_ACCESS_TOKEN']
          access_token_secret = os.environ['X_ACCESS_TOKEN_SECRET']

          # Find latest video
          videos = sorted(glob.glob('**/*.mp4', recursive=True) + glob.glob('**/*.mov', recursive=True))
          if not videos:
              print('No videos found'); sys.exit(1)
          video = videos[len(videos) % 7]  # rotate through videos daily
          print(f'Posting: {video}')

          # Upload media via v1.1 (works reliably)
          auth1 = tweepy.OAuth1UserHandler(consumer_key, consumer_secret, access_token, access_token_secret)
          api = tweepy.API(auth1)
          media = api.media_upload(video)
          media_id = media.media_id_string
          print(f'Media uploaded: {media_id}')

          # Post tweet via v2 with retries
          auth = OAuth1(consumer_key, consumer_secret, access_token, access_token_secret)
          caption = os.path.splitext(os.path.basename(video))[0].replace('-', ' ').title()
          payload = {'text': f'{caption} 🐾 #Animals #Nature', 'media': {'media_ids': [media_id]}}

          for attempt in range(5):
              r = requests.post(
                  'https://api.twitter.com/2/tweets',
                  auth=auth,
                  json=payload,
                  headers={'Content-Type': 'application/json'}
              )
              print(f'Attempt {attempt+1}: {r.status_code} {r.text[:200]}')
              if r.status_code == 201:
                  tweet_id = r.json()['data']['id']
                  print(f'SUCCESS! Tweet posted: https://x.com/Animal2ky/status/{tweet_id}')
                  sys.exit(0)
              elif r.status_code == 503:
                  wait = (attempt + 1) * 10
                  print(f'503 - waiting {wait}s before retry...')
                  time.sleep(wait)
              else:
                  print(f'Fatal error: {r.status_code}')
                  sys.exit(1)

          print('All retries failed')
          sys.exit(1)
          PYEOF
